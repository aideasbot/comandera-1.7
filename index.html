<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Comandas | pido.club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-green { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .dot-fresco { animation: pulse-green 2s infinite; }
        .card-update { transition: all 0.3s ease; animation: fadeInUp 0.4s ease-out; position: relative; }
        .finalizado { opacity: 0.5; filter: grayscale(100%); }
        .logo-shadow { filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.15)); }
        .selected-card { border: 2px solid #3b82f6 !important; background-color: #eff6ff !important; }

        @media print {
            body { background: white !important; padding: 0 !important; }
            header, .no-print, #syncIndicator, .acciones-btn, button, label, input, .panel-control, #modalError, #modalConfirmDelete { display: none !important; }
            .max-w-5xl { max-width: 100% !important; width: 100% !important; margin: 0 !important; }
            #listaComandas { display: block !important; }
            .card-update { display: none !important; border: 1px solid #000 !important; break-inside: avoid; box-shadow: none !important; margin-bottom: 1cm !important; }
            .card-update.printing-active { display: flex !important; opacity: 1 !important; filter: none !important; }
            .bg-gray-50, .bg-blue-50/50 { background: white !important; border: 1px solid #eee !important; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-4 text-slate-800 font-sans">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4 no-print">
            <div class="flex flex-col items-center md:items-start gap-1 text-center md:text-left">
                <img src="https://lh3.googleusercontent.com/d/1RsBODGn_tawqMq-nWNfmvtUWqitsdHKz" alt="Logo pido.club" class="h-20 w-auto object-contain logo-shadow mb-2">
                <div class="flex items-center gap-2">
                    <p class="text-gray-500 font-medium text-sm tracking-tight font-sans">Gestión en tiempo real</p>
                    <span id="syncIndicator" class="text-[10px] bg-green-100 text-green-600 px-2 py-0.5 rounded-full font-bold animate-pulse uppercase tracking-wider">Live</span>
                </div>
            </div>

            <div class="bg-white px-6 py-3 rounded-2xl shadow-sm border border-blue-100 flex flex-col items-center md:items-end">
                <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Ventas del día (visual)</span>
                <span id="totalVentas" class="text-2xl font-black text-slate-900 leading-none mt-1">$ 0</span>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="btnImprimirLote" onclick="imprimirLote()" class="hidden bg-slate-800 text-white px-5 py-2.5 rounded-full shadow-lg font-bold text-xs flex items-center gap-2 hover:bg-slate-900 transition-all transform active:scale-95 uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                    Imprimir Marcados (<span id="countSelected">0</span>)
                </button>
                <button onclick="cargarComandas()" class="bg-white p-3 rounded-full shadow-sm hover:shadow-md transition-all text-blue-600 border border-blue-100 transform active:scale-90">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                </button>
            </div>
        </header>

        <div class="bg-white p-5 rounded-xl shadow-sm mb-8 border border-gray-200 panel-control card-update no-print">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 font-sans">
                <div class="flex flex-col gap-1">
                    <div class="flex items-center justify-between ml-1">
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Llave de Acceso</label>
                        <button onclick="cerrarSesion()" class="text-[10px] font-bold text-gray-400 hover:text-red-500 uppercase tracking-wider">Cerrar sesión</button>
                    </div>
                    <input type="text" id="sheetId" placeholder="Pega tu Llave de Acceso Aquí" class="p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all font-mono">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-1">Filtrar por Fecha</label>
                    <input type="date" id="filtroFecha" onchange="cargarComandas(true)" class="p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all font-bold">
                </div>
                <div class="flex items-end">
                    <button onclick="cargarComandas()" id="btnCargar" class="w-full bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition-all disabled:bg-gray-400 uppercase text-sm tracking-wide transform active:scale-95 font-sans font-black">Ver Pedidos</button>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden text-center py-10 text-gray-500 animate-pulse font-bold tracking-widest uppercase text-xs font-sans">Consultando base de datos...</div>
        <div id="listaComandas" class="grid gap-6"></div>
    </div>

    <div id="modalError" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl text-center">
            <div class="flex justify-center mb-6"><div class="bg-amber-100 p-4 rounded-full"><svg class="w-12 h-12 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg></div></div>
            <h3 id="modalErrorTitle" class="text-3xl font-black text-red-500 mb-4 tracking-tight">Credencial inválida</h3>
            <p id="modalErrorDesc" class="text-slate-600 font-medium leading-relaxed mb-8 px-2 font-sans text-lg">Para gestionar tus comandas, activa tu cuenta por <span class="font-black text-slate-900">$ 18.900.</span></p>
            <a href="https://wa.me/5491165614612?text=Hola.%20Quiero%20activar%20mi%20panel%20de%20comandas%20pido.club" target="_blank" class="block w-full bg-[#8bc34a] hover:bg-[#7cb342] text-white font-black py-4 rounded-2xl shadow-lg mb-4 text-lg">Activar mi cuenta ahora</a>
            <button onclick="probarOtraLlave()" class="text-blue-500 font-black text-sm underline decoration-2 underline-offset-4 hover:text-blue-700 font-sans uppercase tracking-tight">Probar con otra llave</button>
        </div>
    </div>

    <div id="modalConfirmDelete" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4 no-print">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 shadow-2xl text-center">
            <h3 class="text-2xl font-black text-slate-900 mb-2">¿Eliminar comanda?</h3>
            <p class="text-slate-500 mb-8 font-medium">Esta acción eliminará el pedido del Excel y no se puede deshacer.</p>
            <div class="flex flex-col gap-3">
                <button id="btnConfirmarEliminar" class="w-full bg-red-600 text-white font-black py-4 rounded-2xl shadow-lg">SÍ, ELIMINAR AHORA</button>
                <button onclick="cerrarModalDelete()" class="w-full bg-gray-100 text-gray-500 font-bold py-3 rounded-2xl uppercase text-xs">CANCELAR</button>
            </div>
        </div>
    </div>
